name: Build VPS Manager APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Gradlew permissions
        run: chmod +x android/gradlew

      - name: Accept licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk       artifacts/VPSManager-debug.apk       2>/dev/null || true
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk artifacts/VPSManager-release-unsigned.apk 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPSManager-APKs
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
